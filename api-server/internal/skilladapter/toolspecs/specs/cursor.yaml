# Cursor
#
# 2026-06-30 从 internal/skilladapter/cursor/cursor.go 迁来。
#
# Cursor 路径是规范草案(2026-06 探测本机未装 Cursor,路径由社区约定)。
# Cursor 与 OpenCode 例外:不走 Agent Skills 标准,各自读取自己的目录。
#
# 项目级写盘 = <project>/.cursor/skills/(直写 Cursor 自身目录,Cursor 才能读到)。

tool_id: cursor
display_name: "Cursor"
mdi_icon: "mdi:cursor-default-click-outline"
maturity: stable

paths:
  global:
    user:
      - "~/.cursor/skills"
  project:
    user:
      - ".cursor/skills"
