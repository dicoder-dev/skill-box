# Antigravity (Google)
#
# 2026-06-30 增:Antigravity 是 Google 在 2025-11 跟 Gemini 3 一起发布的 AI IDE
# (基于 VSCode),官方明确"skill 全局库"位置在:
#   ~/.gemini/antigravity/skills/<name>/SKILL.md
#
# 项目级用 workflows 机制(.agent/workflows/),不直接读 .claude/skills;
# 但 Antigravity 同时兼容 Agent Skills 标准的 SKILL.md,所以个人级
# 走 .gemini/antigravity/skills/,项目级走 .gemini/antigravity/skills/。
#
# 关键参考:
#   https://blog.csdn.net/luwei42768/article/details/157263739
#   https://www.cnblogs.com/weizwz/p/19540736
#
# maturity=stable:目录约定从 2025-12 起稳定,主流社区均按此路径操作。

tool_id: antigravity
display_name: "Antigravity"
mdi_icon: "mdi:rocket-launch-outline"
maturity: stable

paths:
  global:
    user:
      - "~/.gemini/antigravity/skills"
  project:
    user:
      - ".gemini/antigravity/skills"
