# Cline (VSCode AI 插件)
#
# 2026-06-30 增:Cline 是 VSCode 上的 AI 编程插件(开源,接任意 LLM key)。
# Cline 同时支持两套目录:
#   - ~/.agents/skills/<name>          ← Agent Skills 标准(社区推荐)
#   - ~/.cline/skills/<name>           ← Cline 自己的目录(老用户习惯)
# 两个目录都扫,取并集去重。
#
# 参考:
#   https://docs.cline.bot/features/cline-rules
#   https://gitcode.com/GitHub_Trending/ad/skills(明确 .agents/skills 为默认)
#   https://blog.csdn.net/sD7O95O/article/details/157950267
#
# maturity=stable:目录约定 2026-04 起明确,用户多走 ~/.agents/skills。

tool_id: cline
display_name: "Cline"
mdi_icon: "mdi:file-document-outline"
maturity: stable

paths:
  global:
    user:
      - "~/.agents/skills"
      - "~/.cline/skills"
  project:
    user:
      - ".cline/skills"
