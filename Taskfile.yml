version: '3'

includes:
  common: ./build/Taskfile.yml
  windows: ./build/windows/Taskfile.yml
  darwin: ./build/darwin/Taskfile.yml
  linux: ./build/linux/Taskfile.yml
  ios: ./build/ios/Taskfile.yml
  android: ./build/android/Taskfile.yml

vars:
  APP_NAME: "skill-box"
  BIN_DIR: "bin"
  VITE_PORT: '{{.WAILS_VITE_PORT | default 9245}}'
  # Web 单进程二进制输出路径（Windows 自动追加 .exe）。
  WEB_BIN: '{{.BIN_DIR}}/web{{if eq .OS "windows"}}.exe{{end}}'
  # Web 端默认使用的配置文件（可通过 WEB_CONFIG_FILE 覆盖）。
  WEB_CONFIG_FILE: '{{.WEB_CONFIG_FILE | default "configs.yaml"}}'
  # //go:embed 期望的目录（位于 api-server/cmd/web/frontend/dist），
  # 由 web:sync:embed 任务从根 frontend/dist 同步过来。
  WEB_EMBED_DIR: api-server/cmd/web/frontend

tasks:
  build:
    summary: Builds the application
    cmds:
      - task: "{{OS}}:build"

  package:
    summary: Packages a production build of the application
    cmds:
      - task: "{{OS}}:package"

  run:
    summary: Runs the application
    cmds:
      - task: "{{OS}}:run"

  # 桌面端 dev:启动 wails3 dev,Webview 加载 Vite dev server。
  # 通过 VITE_DEPLOY_MODE=desktop 让 vite.config.js 把 runMode=desktop 写到
  #   1) import.meta.env.VITE_RUN_MODE(前端代码读)
  #   2) index.html 的 <script>window.__APP_RUNTIME__={runMode:"desktop"}</script>
  # wails3 dev 启动 Vite 时会 fork 出 vite 子进程并继承当前 shell 的 env,
  # 所以这里 export 之后子进程自然就拿得到。
  #
  # 想临时切回 web 形态(纯调试前端):
  #   VITE_DEPLOY_MODE=web task dev
  dev:
    summary: 桌面端 dev(wails3 dev,前端识别为 desktop)
    env:
      VITE_DEPLOY_MODE: '{{.VITE_DEPLOY_MODE | default "desktop"}}'
    cmds:
      - wails3 dev -config ./build/config.yml -port {{.VITE_PORT}}

  setup:docker:
    summary: Builds Docker image for cross-compilation (~800MB download)
    cmds:
      - task: common:setup:docker

  # ---- 纯 Web 单进程（api-server/cmd/web）任务 ----
  # 一次起前后端、构建单进程二进制、运行产物均在这里。不依赖 wails3 桌面能力。

  # 同步 api-server 模块的 Go 依赖。
  web:go:mod:tidy:
    summary: 同步 api-server Go 模块依赖
    dir: api-server
    cmds:
      - go mod tidy

  # 仅构建前端 dist（不触发 Wails bindings 生成，纯 Web 不依赖 wails3 CLI）。
  web:build:frontend:
    summary: 构建前端 dist（不依赖 Wails CLI，纯 Web 用）
    label: web:build:frontend (DEV={{.DEV}})
    dir: frontend
    sources:
      - "**/*"
    generates:
      - dist/**/*
    deps:
      - task: common:install:frontend:deps
    cmds:
      - npm run {{.BUILD_COMMAND}} -q
    env:
      PRODUCTION: '{{if eq .DEV "true"}}false{{else}}true{{end}}'
    vars:
      BUILD_COMMAND: '{{if eq .DEV "true"}}build:dev{{else}}build{{end}}'

  # 把根 frontend/dist 同步到 //go:embed 期望的目录。
  web:sync:embed:
    summary: 同步 frontend/dist 到 //go:embed 目录
    sources:
      - frontend/dist/**/*
    generates:
      - api-server/cmd/web/frontend/dist/**/*
    cmds:
      - mkdir -p {{.WEB_EMBED_DIR}}/dist
      - rm -rf {{.WEB_EMBED_DIR}}/dist
      - cp -R frontend/dist/. {{.WEB_EMBED_DIR}}/dist/

  # 完整生产构建：前端 dist → 同步到 embed 目录 → go build。
  # sources/generates 让 Task 能增量判断：源码没变就跳过整条 build 链。
  web:build:
    summary: 构建 Web 端单进程二进制（HTTP API + embed 前端 dist）
    sources:
      - api-server/**/*.go
      - api-server/go.mod
      - api-server/go.sum
    generates:
      - bin/web{{if eq .OS "windows"}}.exe{{end}}
    deps:
      - task: web:build:frontend
      - task: web:sync:embed
      - task: web:go:mod:tidy
    cmds:
      - mkdir -p {{.BIN_DIR}}
      - go build {{.BUILD_FLAGS}} -o {{.WEB_BIN}} ./api-server/cmd/web
    vars:
      BUILD_FLAGS: '{{if eq .DEV "true"}}-buildvcs=false -gcflags=all="-l"{{else}}-tags production -trimpath -buildvcs=false -ldflags="-w -s"{{end}}'

  # 启动 Web 单进程二进制。未构建/源码已更新时，会自动先跑 web:build。
  run:web:
    summary: 启动 Web 单进程二进制（自动 build 如有需要）
    deps:
      - web:build
    cmds:
      - '{{.WEB_BIN}} -config {{.WEB_CONFIG_FILE}}'

  # 后端开发模式：直接 go run，前端代码改动不影响后端。
  # 监听端口由 configs.server.port 决定（默认 8082）。
  web:dev:backend:
    summary: 以 go run 方式启动 Web 后端
    dir: api-server
    cmds:
      - go run ./cmd/web -config ../{{.WEB_CONFIG_FILE}}

  # 前端开发模式：Vite dev server，端口由 VITE_PORT 决定。
  # 强制 VITE_DEPLOY_MODE=web:Web 单进程形态下走同源,不能把前端识别成桌面端。
  # WEB_DEV_OPEN_BROWSER=1 时,启动后用系统默认浏览器打开 http://localhost:{{.VITE_PORT}}/
  # (仅 web 任务支持;wails3 dev 是 macOS native 窗口,本来就不开浏览器)
  web:dev:frontend:
    summary: 启动 Vite 开发服务器（Web 端调试,可选自动开浏览器）
    dir: frontend
    deps:
      - task: common:install:frontend:deps
    env:
      VITE_DEPLOY_MODE: web
    cmds:
      - |
        if [ "{{.WEB_DEV_OPEN_BROWSER}}" = "1" ]; then
          # 后台异步打开浏览器,不等它退出(浏览器关掉不应影响 server)
          (sleep 2 && open "http://localhost:{{.VITE_PORT}}/") &
        fi
        npm run dev -- --port {{.VITE_PORT}} --strictPort

  # 主入口：单终端并行启动后端 + 前端。Ctrl-C 一并停掉。
  # - 后端走 `&` 后台跑；前端也走 `&` 后台；脚本 wait 前端，前端退出时 kill 后端
  # - 不依赖 trap：宿主 shell（dash 系）连数字信号都报 invalid signal specification，干脆不用 trap
  # - Ctrl-C 时整个进程组都收到 SIGINT，前后端一起退；wait 立即返回，杀掉后端收尾
  # - 适用 macOS / Linux；Windows 不支持 `&` 后台语法，请改用分两个终端跑 web:dev:backend + web:dev:frontend
  # - 用 `wails3 task` 而不是裸 `task` 是因为宿主 shell PATH 里不一定有 task CLI
  # - 后端日志用 awk 加 "[backend] " 前缀，方便和 Vite 输出区分；awk 里 fflush() 强制行刷新，
  #   不加 fflush 的话 task 在子进程里会走块缓冲，终端看不到实时输出
  # - 默认 WEB_DEV_OPEN_BROWSER=1 自动 open 浏览器,关掉用 WEB_DEV_OPEN_BROWSER=0 task web
  web:
    summary: 并行启动 Web 端前后端（默认自动开浏览器）
    env:
      WEB_DEV_OPEN_BROWSER: '{{.WEB_DEV_OPEN_BROWSER | default "1"}}'
    cmds:
      - |
        wails3 task web:dev:backend 2>&1 | awk '{ printf "[backend] %s\n", $0; fflush() }' & BACKEND_PID=$!
        wails3 task web:dev:frontend 2>&1 | awk '{ printf "[frontend] %s\n", $0; fflush() }' & FRONTEND_PID=$!
        wait $FRONTEND_PID
        kill $BACKEND_PID 2>/dev/null || true
        wait $BACKEND_PID 2>/dev/null || true

  # 清理 Web 端构建产物（二进制 + embed 同步目录）。
  web:clean:
    summary: 清理 Web 端构建产物
    cmds:
      - rm -f {{.WEB_BIN}}
      - rm -rf {{.WEB_EMBED_DIR}}
