#    name: Wails
#    description: Wails 应用文件
#    iconName: wailsFileIcon
#    role: Editor
#  - ext: jpg
#    name: JPEG
#    description: 图片文件
#    iconName: jpegFileIcon
#    role: Editor
#    mimeType: image/jpeg  # （可选）

# 其他数据
other:
  - name: 我的其他数据
