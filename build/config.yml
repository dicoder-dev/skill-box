# 本文件包含本项目的构建配置。
# 当你更新 `info` 或 `fileAssociations` 后，请执行 `wails3 task common:update:build-assets` 以同步构建资源。
# 注意：该操作会覆盖 build/assets 目录中已有的改动。
version: '3'

# 以下信息用于生成各平台的构建资源。
info:
  companyName: "我的公司" # 公司名称
  productName: "我的产品" # 应用名称
  productIdentifier: "com.mycompany.myproduct" # 应用的唯一标识符（包名/反向域）
  description: "一个示例应用" # 应用简介
  copyright: "版权所有 (c) 2025 我的公司" # 版权声明
  comments: "产品备注信息" # 备注
  version: "0.0.1" # 应用版本号

# iOS 构建配置（取消注释以自定义 iOS 工程生成）
# 注意：当 `ios` 下的字段被显式设置时，会覆盖 `info` 中对应的值。
# ios:
#   # 生成的 Xcode 工程中所使用的 iOS 包标识（CFBundleIdentifier）
#   bundleID: "com.mycompany.myproduct"
#   # 应用图标下显示的名称（CFBundleDisplayName/CFBundleName）
#   displayName: "我的产品"
#   # 写入 Info.plist 的应用版本（CFBundleShortVersionString/CFBundleVersion）
#   version: "0.0.1"
#   # 模板与工程设置中的公司/组织名
#   company: "我的公司"
#   # 额外写入 Info.plist 的备注信息
#   comments: "产品备注信息"

# 开发模式配置
dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - .gitkeep
    watched_extension:
      - "*.go"
      - "*.js" # 监听通过 //wails:include 指令嵌入的 JS/TS 文件变化。
      - "*.ts" # frontend 目录会通过上面的 dir 整体排除。
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

# 文件关联
# 更多信息请参考：https://v3.wails.io/noit/done/yet
fileAssociations:
