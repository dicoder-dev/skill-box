version: '3'

# 公共构建任务，由根目录 Taskfile.yml 引入，
# 为各平台子模块（windows/darwin/linux/ios/android）提供复用的辅助步骤。
# 纯 Web 单进程相关任务（web:*）已迁移到根 Taskfile.yml，去掉 common: 前缀。

tasks:
  # 运行 `go mod tidy`，同步 Go 模块依赖。仅作为其他任务的内部依赖使用。
  go:mod:tidy:
    summary: 运行 `go mod tidy`
    internal: true
    cmds:
      - go mod tidy

  # 安装前端项目依赖（npm install）。
  # 仅在 package.json 或 package-lock.json 变化时执行，并校验 npm 是否已安装。
  install:frontend:deps:
    summary: 安装前端依赖
    dir: frontend
    sources:
      - package.json
      - package-lock.json
    generates:
      - node_modules
    preconditions:
      - sh: npm version
        msg: "未检测到 npm，请先安装 Node.js：https://nodejs.org/en/download/"
    cmds:
      - npm install

  # 构建前端项目（生产或开发模式由 DEV 变量控制）。
  # 内部会先安装前端依赖并生成 Wails 绑定代码。
  build:frontend:
    label: build:frontend (DEV={{.DEV}})
    summary: 构建前端项目
    dir: frontend
    sources:
      - "**/*"
    generates:
      - dist/**/*
    deps:
      - task: install:frontend:deps
      - task: generate:bindings
        vars:
          BUILD_FLAGS:
            ref: .BUILD_FLAGS
    cmds:
      - npm run {{.BUILD_COMMAND}} -q
    env:
      PRODUCTION: '{{if eq .DEV "true"}}false{{else}}true{{end}}'
    vars:
      BUILD_COMMAND: '{{if eq .DEV "true"}}build:dev{{else}}build{{end}}'


  # 下载 Puppertino CSS 并写入 frontend/public 目录，
  # 用于保持移动端样式与桌面端一致；会自动向 index.html 注入样式与按钮 class。
  frontend:vendor:puppertino:
    summary: 拉取 Puppertino CSS 至 frontend/public，保证移动端样式一致
    sources:
      - frontend/public/puppertino/puppertino.css
    generates:
      - frontend/public/puppertino/puppertino.css
    cmds:
      - |
        set -euo pipefail
        mkdir -p frontend/public/puppertino
        # 若已存在打包好的 Puppertino 则直接复用；否则尝试从 GitHub 拉取，失败也不中断构建。
        if [ ! -f frontend/public/puppertino/puppertino.css ]; then
          echo "未发现已打包的 Puppertino，尝试从 GitHub 下载..."
          if curl -fsSL https://raw.githubusercontent.com/codedgar/Puppertino/main/dist/css/full.css -o frontend/public/puppertino/puppertino.css; then
            curl -fsSL https://raw.githubusercontent.com/codedgar/Puppertino/main/LICENSE -o frontend/public/puppertino/LICENSE || true
            echo "Puppertino CSS 已下载到 frontend/public/puppertino/puppertino.css"
          else
            echo "警告：无法下载 Puppertino CSS，模板可能已自带该样式，跳过下载。"
          fi
        else
          echo "使用已打包的 Puppertino：frontend/public/puppertino/puppertino.css"
        fi
        # 确保 index.html 中引入了 Puppertino 样式与按钮 class。
        INDEX_HTML=frontend/index.html
        if [ -f "$INDEX_HTML" ]; then
          if ! grep -q 'href="/puppertino/puppertino.css"' "$INDEX_HTML"; then
            # 在 style.css 之后插入 Puppertino 链接。
            awk '
              /href="\/style.css"\/?/ && !x { print; print "    <link rel=\"stylesheet\" href=\"/puppertino/puppertino.css\"/>"; x=1; next }1
            ' "$INDEX_HTML" > "$INDEX_HTML.tmp" && mv "$INDEX_HTML.tmp" "$INDEX_HTML"
          fi
          # 若存在默认的 .btn，则替换为 Puppertino 主按钮样式。
          sed -E -i'' 's/class=\"btn\"/class=\"p-btn p-prim-col\"/g' "$INDEX_HTML" || true
        fi


  # 根据 Go 源码生成前端可调用的 Wails 绑定代码，
  # 同时依赖 go mod tidy；切换 dev/production 模式时也会触发重新生成。
  generate:bindings:
    label: generate:bindings (BUILD_FLAGS={{.BUILD_FLAGS}})
    summary: 为前端生成 Wails 绑定代码
    deps:
      - task: go:mod:tidy
    sources:
      - "**/*.[jt]s"
      - exclude: frontend/**/*
      - frontend/bindings/**/*  # 在 dev/production 模式切换时输出会变化，需重新执行
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - frontend/bindings/**/*
    cmds:
      - wails3 generate bindings -f '{{.BUILD_FLAGS}}' -clean=true

  # 根据 build/appicon.png 生成各平台所需的图标资源。
  generate:icons:
    summary: 由 appicon.png 生成 Windows `.ico` 与 macOS `.icns` 图标
    dir: build
    sources:
      - "appicon.png"
    generates:
      - "darwin/icons.icns"
      - "windows/icon.ico"
    cmds:
      - wails3 generate icons -input appicon.png -macfilename darwin/icons.icns -windowsfilename windows/icon.ico

  # 启动 Vite 开发服务器（前端热更新），端口由 VITE_PORT 决定。
  # VITE_DEPLOY_MODE 由调用方任务(根 task dev / web)通过 env 注入,
  # 本任务不设默认值,跟着上游走。
  #   - 根 task dev            → desktop
  #   - 根 task web            → web
  # vite.config.js 据此把 runMode 写到 import.meta.env 与 index.html。
  dev:frontend:
    summary: 启动 Vite 开发服务器（runMode 跟随上游 env 注入）
    dir: frontend
    deps:
      - task: install:frontend:deps
    cmds:
      - npm run dev -- --port {{.VITE_PORT}} --strictPort

  # 根据当前 config.yml 同步更新 build/assets 目录中的构建资源。
  update:build-assets:
    summary: 更新构建资源
    dir: build
    cmds:
      - wails3 update build-assets -name "{{.APP_NAME}}" -binaryname "{{.APP_NAME}}" -config config.yml -dir .

  # 构建交叉编译所需的 Docker 镜像（约 800MB），
  # 一次性准备，可在任意宿主机上完成跨平台构建。
  setup:docker:
    summary: 构建用于交叉编译的 Docker 镜像（约 800MB）
    desc: |
      构建用于交叉编译到任意平台的 Docker 镜像。
      仅需执行一次，即可在任意操作系统上启用跨平台构建。
    cmds:
      - docker build -t wails-cross -f build/docker/Dockerfile.cross build/docker/
    preconditions:
      - sh: docker info > /dev/null 2>&1
        msg: "需要 Docker 环境，请先安装 Docker。"

  # 列出当前已连接的 iOS 真机 UDID。
  ios:device:list:
    summary: 列出已连接的 iOS 真机（UDID）
    cmds:
      - xcrun xcdevice list

  # 通过 xcodebuild/devicectl 构建、安装并启动应用到 iPhone 真机。
  # 使用前需先在命令行注入 PROJECT、SCHEME、UDID、BUNDLE_ID 等变量。
  ios:run:device:
    summary: 基于 Apple 工具链（xcodebuild/devicectl）在 iPhone 真机上构建、安装并启动应用
    vars:
      PROJECT: '{{.PROJECT}}'   # 例如：build/ios/xcode/<YourProject>.xcodeproj
      SCHEME: '{{.SCHEME}}'     # 例如：ios.dev
      CONFIG: '{{.CONFIG | default "Debug"}}'
      DERIVED: '{{.DERIVED | default "build/ios/DerivedData"}}'
      UDID: '{{.UDID}}'         # 来自 `task ios:device:list`
      BUNDLE_ID: '{{.BUNDLE_ID}}' # 例如：com.yourco.wails.ios.dev
      TEAM_ID: '{{.TEAM_ID}}'   # 可选；若项目尚未配置签名则需要提供
    preconditions:
      - sh: xcrun -f xcodebuild
        msg: "未找到 xcodebuild，请先安装 Xcode。"
      - sh: xcrun -f devicectl
        msg: "未找到 devicectl，请升级到 Xcode 15+（内置 devicectl）。"
      - sh: test -n '{{.PROJECT}}'
        msg: "请设置 PROJECT 为 .xcodeproj 路径（例如：PROJECT=build/ios/xcode/App.xcodeproj）。"
      - sh: test -n '{{.SCHEME}}'
        msg: "请设置 SCHEME 为应用 scheme（例如：SCHEME=ios.dev）。"
      - sh: test -n '{{.UDID}}'
        msg: "请设置 UDID 为目标设备 UDID（参考：task ios:device:list）。"
      - sh: test -n '{{.BUNDLE_ID}}'
        msg: "请设置 BUNDLE_ID 为应用包标识（例如：com.yourco.wails.ios.dev）。"
    cmds:
      - |
        set -euo pipefail
        echo "正在为真机构建：UDID={{.UDID}} SCHEME={{.SCHEME}} PROJECT={{.PROJECT}}"
        XCB_ARGS=(
          -project "{{.PROJECT}}"
          -scheme "{{.SCHEME}}"
          -configuration "{{.CONFIG}}"
          -destination "id={{.UDID}}"
          -derivedDataPath "{{.DERIVED}}"
          -allowProvisioningUpdates
          -allowProvisioningDeviceRegistration
        )
        # 若传入了签名相关信息，则一并注入到 xcodebuild。
        if [ -n '{{.TEAM_ID}}' ]; then XCB_ARGS+=(DEVELOPMENT_TEAM={{.TEAM_ID}}); fi
        if [ -n '{{.BUNDLE_ID}}' ]; then XCB_ARGS+=(PRODUCT_BUNDLE_IDENTIFIER={{.BUNDLE_ID}}); fi
        xcodebuild "${XCB_ARGS[@]}" build | xcpretty || true
        # 未安装 xcpretty 时回退到原始输出。
        if [ "${PIPESTATUS[0]}" -ne 0 ]; then
          xcodebuild "${XCB_ARGS[@]}" build
        fi
        # 定位构建产物 .app。
        APP_PATH=$(find "{{.DERIVED}}/Build/Products" -type d -name "*.app" -maxdepth 3 | head -n 1)
        if [ -z "$APP_PATH" ]; then
          echo "在 {{.DERIVED}}/Build/Products 下未找到构建产物 .app" >&2
          exit 1
        fi
        echo "正在安装：$APP_PATH"
        xcrun devicectl device install app --device "{{.UDID}}" "$APP_PATH"
        echo "正在启动：{{.BUNDLE_ID}}"
        xcrun devicectl device process launch --device "{{.UDID}}" --stderr console --stdout console "{{.BUNDLE_ID}}"

